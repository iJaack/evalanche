name: Release on Version Tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NODE_VERSION: '20'
      RELEASE_ARTIFACT_DIR: .release-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_NOTES_FILE="docs/releases/RELEASE_NOTES_${VERSION}.md"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=${RELEASE_NOTES_FILE}" >> "$GITHUB_OUTPUT"
          echo "version: ${VERSION}"
          echo "release notes file: ${RELEASE_NOTES_FILE}"

      - name: Validate release metadata
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.version }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          RELEASE_NOTES_FILE="${{ steps.meta.outputs.release_notes_file }}"

          echo "release tag: $TAG"
          echo "package.json version: $PKG_VERSION"
          echo "package name: $PKG_NAME"

          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Release tag does not match package.json version"
            exit 1
          fi

          if [ "$PKG_NAME" != "evalanche" ]; then
            echo "Unexpected package name: $PKG_NAME"
            exit 1
          fi

          if [ ! -f "$RELEASE_NOTES_FILE" ]; then
            echo "Missing release notes file: $RELEASE_NOTES_FILE"
            exit 1
          fi

      - name: Prepare release artifacts
        shell: bash
        run: mkdir -p "$RELEASE_ARTIFACT_DIR"

      - name: Determine previous tag
        id: previous_tag
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^v${VERSION}$" | head -n1 || true)
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          echo "previous tag: ${PREVIOUS_TAG:-none}"

      - name: Release integrity gate
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node scripts/release-integrity-check.mjs \
            --version "$VERSION" \
            --tag "v$VERSION" \
            --release-notes "${{ steps.meta.outputs.release_notes_file }}" \
            --out "$RELEASE_ARTIFACT_DIR/release-integrity-v${VERSION}.json"
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); console.log('## Release Integrity\\n'); console.log('- Version: `'+data.version+'`'); console.log('- Release notes: `'+data.releaseNotesPath+'`'); console.log('- Highlights: '+data.highlightsCount);" "$RELEASE_ARTIFACT_DIR/release-integrity-v${VERSION}.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Release notes coverage gate
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node scripts/check-release-notes-coverage.mjs \
            --version "$VERSION" \
            --previous-tag "${{ steps.previous_tag.outputs.previous_tag }}" \
            --current-ref "$GITHUB_SHA" \
            --release-notes "${{ steps.meta.outputs.release_notes_file }}" \
            --out "$RELEASE_ARTIFACT_DIR/release-notes-coverage-v${VERSION}.json"

      - name: Install dependencies
        run: npm ci

      - name: Capture production audit snapshot
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          npm audit --omit=dev --json > "$RELEASE_ARTIFACT_DIR/audit-report-v${VERSION}.json" || true

      - name: Refresh release docs
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          npm run refresh:release-docs -- --version "$VERSION" --release-notes "${{ steps.meta.outputs.release_notes_file }}" --audit-file "$RELEASE_ARTIFACT_DIR/audit-report-v${VERSION}.json" --out "$RELEASE_ARTIFACT_DIR/doc-refresh-v${VERSION}.json"

      - name: Capture release docs patch
        id: docs_patch
        shell: bash
        run: |
          DOC_FILES=(README.md ROADMAP.md RELEASING.md SECURITY.md VULN_NOTES.md)
          PATCH_FILE="$RUNNER_TEMP/release-docs.patch"

          if git diff --quiet -- "${DOC_FILES[@]}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "patch_file=" >> "$GITHUB_OUTPUT"
          else
            git diff -- "${DOC_FILES[@]}" > "$PATCH_FILE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "patch_file=$PATCH_FILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        id: tests
        run: npm test

      - name: Run typecheck
        id: typecheck
        run: npm run typecheck

      - name: Build package
        id: build
        run: npm run build

      - name: Export MCP tools
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node scripts/export-mcp-tools.mjs --out "$RELEASE_ARTIFACT_DIR/mcp-tools-v${VERSION}.json"

      - name: Docs parity gate
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node scripts/check-docs-parity.mjs \
            --version "$VERSION" \
            --mcp-tools "$RELEASE_ARTIFACT_DIR/mcp-tools-v${VERSION}.json" \
            --out "$RELEASE_ARTIFACT_DIR/docs-parity-v${VERSION}.json"
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); console.log('## Docs Parity\\n'); console.log('- MCP tools exported: '+data.toolCount); console.log('- Status: '+(data.ok?'pass':'fail'));" "$RELEASE_ARTIFACT_DIR/docs-parity-v${VERSION}.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Build npm pack artifact
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          npm pack --json --pack-destination "$RELEASE_ARTIFACT_DIR" > "$RELEASE_ARTIFACT_DIR/npm-pack-v${VERSION}.json"

      - name: Package tarball gate
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node scripts/check-package-tarball.mjs \
            --pack-json "$RELEASE_ARTIFACT_DIR/npm-pack-v${VERSION}.json" \
            --out "$RELEASE_ARTIFACT_DIR/npm-tarball-check-v${VERSION}.json"

      - name: Read-only smoke gate
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node scripts/release-smoke.mjs --out "$RELEASE_ARTIFACT_DIR/release-smoke-v${VERSION}.json"

      - name: Audit regression gate
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node scripts/check-audit-regressions.mjs \
            --audit "$RELEASE_ARTIFACT_DIR/audit-report-v${VERSION}.json" \
            --baseline "docs/security/audit-baseline.json" \
            --out "$RELEASE_ARTIFACT_DIR/audit-regression-v${VERSION}.json"

      - name: Push refreshed docs to main
        if: steps.docs_patch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag commit is not contained in origin/main"
            exit 1
          fi

          WORKTREE_DIR="$RUNNER_TEMP/release-docs-main"
          git worktree add -B main "$WORKTREE_DIR" origin/main

          cd "$WORKTREE_DIR"
          git apply --3way "${{ steps.docs_patch.outputs.patch_file }}"

          if git diff --quiet -- README.md ROADMAP.md RELEASING.md SECURITY.md VULN_NOTES.md; then
            echo "No docs changes left to commit on main"
            exit 0
          fi

          git add README.md ROADMAP.md RELEASING.md SECURITY.md VULN_NOTES.md
          git commit -m "docs: refresh release docs for v${{ steps.meta.outputs.version }}"
          git push origin HEAD:main

      - name: Preflight package identity
        run: |
          echo "package: $(node -p "require('./package.json').name")"
          echo "version: $(node -p "require('./package.json').version")"
          npm view evalanche version || true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TITLE="Evalanche v${{ steps.meta.outputs.version }}"
          NOTES_FILE="${{ steps.meta.outputs.release_notes_file }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi

      - name: Build release manifest
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node scripts/build-release-manifest.mjs \
            --version "$VERSION" \
            --tag "${{ github.ref_name }}" \
            --sha "$GITHUB_SHA" \
            --release-notes "${{ steps.meta.outputs.release_notes_file }}" \
            --mcp-tools "$RELEASE_ARTIFACT_DIR/mcp-tools-v${VERSION}.json" \
            --pack-json "$RELEASE_ARTIFACT_DIR/npm-pack-v${VERSION}.json" \
            --tarball-check "$RELEASE_ARTIFACT_DIR/npm-tarball-check-v${VERSION}.json" \
            --audit "$RELEASE_ARTIFACT_DIR/audit-report-v${VERSION}.json" \
            --audit-regression "$RELEASE_ARTIFACT_DIR/audit-regression-v${VERSION}.json" \
            --doc-refresh "$RELEASE_ARTIFACT_DIR/doc-refresh-v${VERSION}.json" \
            --out "$RELEASE_ARTIFACT_DIR/release-manifest-v${VERSION}.json"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          gh release upload "${{ github.ref_name }}" \
            "$RELEASE_ARTIFACT_DIR/release-integrity-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/release-notes-coverage-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/mcp-tools-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/docs-parity-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/npm-pack-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/npm-tarball-check-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/evalanche-${VERSION}.tgz" \
            "$RELEASE_ARTIFACT_DIR/audit-report-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/audit-regression-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/release-smoke-v${VERSION}.json" \
            "$RELEASE_ARTIFACT_DIR/release-manifest-v${VERSION}.json" \
            --clobber

      - name: Publish to npm
        shell: bash
        run: |
          set +e
          PUBLISH_LOG="$RUNNER_TEMP/npm-publish.log"
          npm publish --provenance --access public --registry=https://registry.npmjs.org/ 2>&1 | tee "$PUBLISH_LOG"
          PUBLISH_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$PUBLISH_EXIT" -eq 0 ]; then
            exit 0
          fi

          VERSION="${{ steps.meta.outputs.version }}"
          if grep -q 'TLOG_CREATE_ENTRY_ERROR' "$PUBLISH_LOG"; then
            PUBLISHED_VERSION=$(npm view evalanche version --registry=https://registry.npmjs.org/ 2>/dev/null || true)
            if [ "$PUBLISHED_VERSION" = "$VERSION" ]; then
              echo "npm publish hit transparency-log duplicate, but evalanche@$VERSION is already live; continuing."
              exit 0
            fi
          fi

          exit "$PUBLISH_EXIT"

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Authenticate ClawHub CLI
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "Missing CLAWHUB_TOKEN secret"
            exit 1
          fi
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          clawhub whoami

      - name: Publish ClawHub skill
        shell: bash
        run: |
          CHANGELOG="$(cat "${{ steps.meta.outputs.release_notes_file }}")"
          clawhub publish skill \
            --slug evalanche \
            --version "${{ steps.meta.outputs.version }}" \
            --tags latest \
            --changelog "$CHANGELOG"

      - name: Build release summary
        if: always()
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          ASSETS="release-integrity-v${VERSION}.json,release-notes-coverage-v${VERSION}.json,mcp-tools-v${VERSION}.json,docs-parity-v${VERSION}.json,npm-pack-v${VERSION}.json,npm-tarball-check-v${VERSION}.json,evalanche-${VERSION}.tgz,audit-report-v${VERSION}.json,audit-regression-v${VERSION}.json,release-smoke-v${VERSION}.json,release-manifest-v${VERSION}.json"
          node scripts/build-release-summary.mjs \
            --version "$VERSION" \
            --release-notes "${{ steps.meta.outputs.release_notes_file }}" \
            --tests "${{ steps.tests.outcome }}" \
            --typecheck "${{ steps.typecheck.outcome }}" \
            --build "${{ steps.build.outcome }}" \
            --integrity "$RELEASE_ARTIFACT_DIR/release-integrity-v${VERSION}.json" \
            --docs-parity "$RELEASE_ARTIFACT_DIR/docs-parity-v${VERSION}.json" \
            --tarball-check "$RELEASE_ARTIFACT_DIR/npm-tarball-check-v${VERSION}.json" \
            --audit-regression "$RELEASE_ARTIFACT_DIR/audit-regression-v${VERSION}.json" \
            --mcp-tools "$RELEASE_ARTIFACT_DIR/mcp-tools-v${VERSION}.json" \
            --smoke "$RELEASE_ARTIFACT_DIR/release-smoke-v${VERSION}.json" \
            --manifest "$RELEASE_ARTIFACT_DIR/release-manifest-v${VERSION}.json" \
            --assets "$ASSETS" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-v${{ steps.meta.outputs.version }}
          path: ${{ env.RELEASE_ARTIFACT_DIR }}
